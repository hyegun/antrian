<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Operator Antrian – Cek Kesehatan Darah 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0d2250;
      --navy-mid: #1a3a6e;
      --red: #c0392b;
      --red-light: #e74c3c;
      --gold: #f0c419;
      --green: #1a7a4a;
      --green-light: #27ae60;
      --white: #ffffff;
      --bg: #eef2fb;
      --border: #d0d9ef;
      --text: #1a2a4a;
      --muted: #6b7a99;
    }

    body {
      font-family: "Inter", Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* HEADER */
    .header {
      width: 100%;
      background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 60%, #1e4d8c 100%);
      padding: 20px 20px 16px;
      text-align: center;
    }
    .header-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .header-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
    }
    .header-sub {
      font-size: 11px;
      color: rgba(255,255,255,0.55);
      margin-top: 4px;
    }

    /* STAT BAR */
    .stat-bar {
      width: 100%;
      max-width: 480px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }
    .stat-item {
      padding: 10px 8px;
      text-align: center;
      background: var(--navy);
      border-right: 1px solid rgba(255,255,255,0.08);
    }
    .stat-item:nth-child(2) { background: #7a3010; }
    .stat-item:nth-child(3) { background: var(--green); }
    .stat-num  { font-size: 22px; font-weight: 800; color: var(--white); line-height: 1; }
    .stat-lbl  { font-size: 9px; color: rgba(255,255,255,0.6); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

    /* MAIN WRAP */
    .main {
      width: 100%;
      max-width: 480px;
      padding: 18px 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* SEDANG DIPANGGIL CARD */
    .call-card {
      background: var(--white);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(13,34,80,0.10);
    }
    .call-card-header {
      background: var(--navy);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .call-card-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.65);
      text-transform: uppercase;
    }
    .call-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .call-badge.memanggil { background: var(--gold); color: #5a3d00; }
    .call-badge.kosong    { background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.6); }

    .call-body {
      padding: 20px 16px 22px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .call-nomor-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 110px;
    }
    .wave-anim {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 16px;
      margin-bottom: 4px;
    }
    .wave-anim span {
      display: inline-block;
      width: 3px;
      background: var(--red);
      border-radius: 2px;
      animation: wavebar 1s ease-in-out infinite;
    }
    .wave-anim span:nth-child(2) { animation-delay: 0.15s; }
    .wave-anim span:nth-child(3) { animation-delay: 0.30s; }
    .wave-anim span:nth-child(4) { animation-delay: 0.15s; }
    .wave-anim.idle span         { animation: none; height: 4px; background: var(--border); }
    @keyframes wavebar { 0%,100% { height: 4px; } 50% { height: 16px; } }

    .call-nomor {
      font-size: 72px;
      font-weight: 800;
      color: var(--red);
      line-height: 1;
      letter-spacing: -3px;
    }
    .call-nomor.idle { color: var(--border); }

    .call-info { flex: 1; }
    .call-nama {
      font-size: 18px;
      font-weight: 800;
      color: var(--navy);
      line-height: 1.2;
    }
    .call-nama.idle { color: var(--muted); font-weight: 600; font-size: 15px; }
    .call-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 5px;
      line-height: 1.4;
    }
    .call-waktu {
      font-size: 11px;
      color: var(--red);
      font-weight: 600;
      margin-top: 8px;
    }

    /* TOMBOL AKSI */
    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btn {
      border: none;
      border-radius: 12px;
      padding: 14px 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-family: "Inter", Arial, sans-serif;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { opacity: 0.82; transform: scale(0.98); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-next   { background: var(--navy); color: var(--white); grid-column: 1 / -1; padding: 16px; font-size: 15px; }
    .btn-ulang  { background: #fff3cd; color: #7a5c00; }
    .btn-skip   { background: #f7f9ff; color: var(--navy); border: 1.5px solid var(--border); }

    /* ANTRIAN LIST */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .antrian-list {
      background: var(--white);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(13,34,80,0.06);
    }
    .antrian-list-header {
      display: grid;
      grid-template-columns: 52px 1fr 90px;
      gap: 8px;
      padding: 8px 14px;
      background: #f7f9ff;
      border-bottom: 1px solid var(--border);
    }
    .antrian-list-header span {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .antrian-row {
      display: grid;
      grid-template-columns: 52px 1fr 90px;
      gap: 8px;
      align-items: center;
      padding: 11px 14px;
      border-bottom: 1px solid #f0f3fb;
    }
    .antrian-row:last-child { border-bottom: none; }
    .antrian-row.row-dipanggil { background: #fffbea; }
    .antrian-row.row-selesai   { opacity: 0.45; }
    .ar-no {
      font-size: 17px;
      font-weight: 800;
      color: var(--navy);
    }
    .ar-nama { font-size: 13px; color: var(--text); font-weight: 600; }
    .ar-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      text-align: center;
    }
    .ab-menunggu  { background: #eef2fb; color: var(--navy); }
    .ab-dipanggil { background: #fff3cd; color: #7a5c00; }
    .ab-selesai   { background: #e8f8ef; color: var(--green); }
    .list-empty {
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--navy);
      color: var(--white);
      padding: 12px 22px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      transition: transform 0.3s ease;
      z-index: 999;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--green); }
    .toast.warning { background: #b8860b; }
    .toast.error   { background: var(--red); }

    /* LOADING */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,34,80,0.35);
      z-index: 998;
      align-items: center;
      justify-content: center;
    }
    .loading-overlay.show { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .page-footer {
      width: 100%; max-width: 480px;
      padding: 0 16px 20px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
    }

    @media print { .no-print { display: none !important; } }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-eyebrow">Panel Operator</div>
  <div class="header-title">Antrian Pemeriksaan</div>
  <div class="header-sub">Cek Kesehatan Darah · Minggu, 19 Juli 2026</div>
</div>

<!-- STATISTIK -->
<div class="stat-bar">
  <div class="stat-item">
    <div class="stat-num" id="sTot">–</div>
    <div class="stat-lbl">Terdaftar</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="sAntri">–</div>
    <div class="stat-lbl">Menunggu</div>
  </div>
  <div class="stat-item">
    <div class="stat-num" id="sDone">–</div>
    <div class="stat-lbl">Selesai</div>
  </div>
</div>

<!-- KONTEN UTAMA -->
<div class="main">

  <!-- CARD SEDANG DIPANGGIL -->
  <div class="call-card">
    <div class="call-card-header">
      <span class="call-card-label">Sedang Dipanggil</span>
      <span class="call-badge kosong" id="callBadge">Belum ada</span>
    </div>
    <div class="call-body">
      <div class="call-nomor-wrap">
        <div class="wave-anim idle" id="waveAnim">
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="call-nomor idle" id="callNomor">–</div>
      </div>
      <div class="call-info">
        <div class="call-nama idle" id="callNama">Belum ada antrian dipanggil</div>
        <div class="call-sub" id="callSub">Tekan "Panggil Berikutnya" untuk mulai</div>
        <div class="call-waktu" id="callWaktu" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- TOMBOL AKSI -->
  <div class="no-print">
    <div class="action-grid">
      <button class="btn btn-next" id="btnNext" onclick="panggilBerikutnya()">
        📢 &nbsp;Panggil Berikutnya
      </button>
      <button class="btn btn-ulang" id="btnUlang" onclick="ulangPanggil()" disabled>
        🔁 &nbsp;Ulang Panggil
      </button>
      <button class="btn btn-skip" onclick="loadSemua()">
        🔄 &nbsp;Refresh
      </button>
    </div>
  </div>

  <!-- DAFTAR ANTRIAN -->
  <div>
    <div class="section-label">Daftar Antrian</div>
    <div class="antrian-list">
      <div class="antrian-list-header">
        <span>No.</span>
        <span>Nama</span>
        <span>Status</span>
      </div>
      <div id="antriBody">
        <div class="list-empty">Memuat data...</div>
      </div>
    </div>
  </div>

</div>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbylOYVEZRwqeOWQcDKPjeFgIHDB6Twt4iu-RBugr2BW9frFONyY6n2ij5VqDt3QVb-1/exec";

  let currentRowIndex = null;
  let currentNoAntri  = null;
  let currentNama     = null;
  let waktuPanggil    = null;
  let semuaData       = [];

  // ── PANGGIL BERIKUTNYA ──────────────────────────────────────────
  function panggilBerikutnya() {
    showLoading();
    fetch(API + "?action=nextAntrian")
      .then(r => r.json())
      .then(res => {
        hideLoading();
        if (res.status === "selesai" || res.status === "kosong") {
          showToast("Semua antrian sudah selesai 🎉", "success");
          resetCallCard();
          loadSemua();
          return;
        }
        if (res.status === "ok") {
          currentRowIndex = res.rowIndex;
          currentNoAntri  = res.noAntri;
          currentNama     = res.nama;
          waktuPanggil    = new Date();
          updateCallCard(res.noAntri, res.nama);
          speakAntrian(res.noAntri, res.nama);
          showToast("Memanggil No. " + res.noAntri + " – " + res.nama, "success");
          document.getElementById("btnUlang").disabled = false;
          loadSemua();
        }
      })
      .catch(err => {
        hideLoading();
        showToast("Gagal: " + err.message, "error");
      });
  }

  // ── ULANG PANGGIL ───────────────────────────────────────────────
  function ulangPanggil() {
    if (!currentNoAntri) return;
    speakAntrian(currentNoAntri, currentNama);
    showToast("Memanggil ulang No. " + currentNoAntri, "warning");

    // Animasi flash sebentar
    const el = document.getElementById("callNomor");
    el.style.opacity = "0.3";
    setTimeout(() => { el.style.opacity = "1"; }, 300);
  }

  // ── UPDATE CALL CARD ────────────────────────────────────────────
  function updateCallCard(noAntri, nama) {
    const nomEl  = document.getElementById("callNomor");
    const namaEl = document.getElementById("callNama");
    const subEl  = document.getElementById("callSub");
    const wave   = document.getElementById("waveAnim");
    const badge  = document.getElementById("callBadge");
    const waktuEl= document.getElementById("callWaktu");

    nomEl.textContent  = noAntri;
    nomEl.className    = "call-nomor";
    namaEl.textContent = nama;
    namaEl.className   = "call-nama";
    subEl.textContent  = "Silakan menuju meja pemeriksaan";
    wave.className     = "wave-anim";
    badge.textContent  = "Memanggil...";
    badge.className    = "call-badge memanggil";
    waktuEl.style.display = "block";
    tickWaktu();
  }

  function resetCallCard() {
    document.getElementById("callNomor").textContent = "–";
    document.getElementById("callNomor").className   = "call-nomor idle";
    document.getElementById("callNama").textContent  = "Semua antrian selesai";
    document.getElementById("callNama").className    = "call-nama idle";
    document.getElementById("callSub").textContent   = "Tidak ada antrian tersisa";
    document.getElementById("waveAnim").className    = "wave-anim idle";
    document.getElementById("callBadge").textContent = "Selesai";
    document.getElementById("callBadge").className   = "call-badge kosong";
    document.getElementById("callWaktu").style.display = "none";
    document.getElementById("btnUlang").disabled = true;
    currentRowIndex = null; currentNoAntri = null; currentNama = null;
  }

  // ── TIMER DURASI ────────────────────────────────────────────────
  let timerInterval;
  function tickWaktu() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      if (!waktuPanggil) return;
      const detik = Math.floor((new Date() - waktuPanggil) / 1000);
      const m = Math.floor(detik / 60).toString().padStart(2,"0");
      const s = (detik % 60).toString().padStart(2,"0");
      document.getElementById("callWaktu").textContent = "⏱ Dipanggil " + m + ":" + s + " yang lalu";
    }, 1000);
  }

  // ── LOAD SEMUA DATA ─────────────────────────────────────────────
  function loadSemua() {
    // Statistik
    fetch(API + "?action=statistik")
      .then(r => r.json())
      .then(res => {
        if (res.status === "ok") {
          document.getElementById("sTot").textContent   = res.hadir;
          document.getElementById("sAntri").textContent = res.menunggu;
          document.getElementById("sDone").textContent  = res.selesai;
        }
      })
      .catch(() => {});
  
    renderDaftarDariStatik();
  }

  // Render daftar antrian dari data yang kita cache sementara
  // (untuk full list perlu endpoint tambahan — tampilkan data yg tersedia)
  function renderDaftarDariStatik() {
    fetch(API + "?action=antrian")
      .then(r => r.json())
      .then(res => {
        const body = document.getElementById("antriBody");

        // Kita hanya punya data antrian berikutnya dari endpoint antrian
        // Tampilkan info sederhana
        if (res.status === "kosong") {
          body.innerHTML = '<div class="list-empty">Tidak ada antrian menunggu</div>';
          return;
        }

        // Tampilkan antrian berikutnya yang sedang menunggu
        let html = "";

        // Yang sedang dipanggil (dari state lokal)
        if (currentNoAntri) {
          html += `
            <div class="antrian-row row-dipanggil">
              <div class="ar-no">${currentNoAntri}</div>
              <div class="ar-nama">${currentNama}</div>
              <span class="ar-badge ab-dipanggil">Dipanggil</span>
            </div>`;
        }

        // Berikutnya dari server
        if (res.status === "ok") {
          // Jangan duplikat jika sama dengan yang sedang dipanggil
          if (res.noAntri !== currentNoAntri) {
            html += `
              <div class="antrian-row">
                <div class="ar-no">${res.noAntri}</div>
                <div class="ar-nama">${res.nama}</div>
                <span class="ar-badge ab-menunggu">Menunggu</span>
              </div>`;
          }
          html += `<div class="list-empty" style="padding:10px 14px; font-size:11px;">
            + antrian lain masih menunggu
          </div>`;
        }

        body.innerHTML = html || '<div class="list-empty">Tidak ada antrian</div>';
      })
      .catch(() => {
        document.getElementById("antriBody").innerHTML =
          '<div class="list-empty">Gagal memuat antrian</div>';
      });
  }

  // ── TEXT TO SPEECH ──────────────────────────────────────────────
  function speakAntrian(no, nama) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();

    const noInt = parseInt(no);
    const text  = `Nomor antrian ${noInt}, atas nama ${nama}, silakan menuju meja pemeriksaan.`;
    const utt   = new SpeechSynthesisUtterance(text);
    utt.lang    = "id-ID";
    utt.rate    = 0.92;
    utt.pitch   = 1;

    // Pilih suara Indonesia jika tersedia
    const voices = window.speechSynthesis.getVoices();
    const idVoice = voices.find(v => v.lang.startsWith("id"));
    if (idVoice) utt.voice = idVoice;

    window.speechSynthesis.speak(utt);
  }

  // Preload voices
  window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };

  // ── HELPERS ─────────────────────────────────────────────────────
  function showLoading() { document.getElementById("loadingOverlay").classList.add("show"); }
  function hideLoading() { document.getElementById("loadingOverlay").classList.remove("show"); }

  let toastTimer;
  function showToast(msg, type) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className   = "toast show " + (type || "");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = "toast", 3000);
  }

  // ── INIT ────────────────────────────────────────────────────────
  loadSemua();
  setInterval(loadSemua, 8000);
</script>
</body>
</html>
